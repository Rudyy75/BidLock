services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: realtime_hub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: realtime_hub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  
  redis:
    image: redis:7-alpine
    container_name: realtime_hub_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
